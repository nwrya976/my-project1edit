<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTrack Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* شريط علوي احترافي */
        .header {
            width: 100%;
            height: 60px;
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        /* زر الهامبرغر لاستدعاء السلايدر */
        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #4a154b; /* لون هوية بروتراك المائل للبنفسجي */
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:active {
            background-color: #f0f0f0;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #4a154b;
        }

        /* الحاوية الرئيسية ومحتوى الترحيب */
        .main-container {
            margin-top: 100px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
        }

        .welcome-card {
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .welcome-card h1 {
            font-size: 24px;
            color: #4a154b;
            margin-bottom: 10px;
        }

        .welcome-card p {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* زر استرشادي كبير داخل الصفحة */
        .action-btn {
            display: inline-block;
            background-color: #4a154b;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(74, 21, 75, 0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
            background-color: #350f36;
        }
    </style>
</head>
<body>

    <!-- شريط التنقل العلوي -->
    <header class="header">
        <!-- الرابط السحري لفتح السلايدر الخاص بالمنصة -->
        <a href="w2n://open-sidebar" class="menu-btn">
            &#9776; <!-- رمز الخطوط الثلاثة للرابط -->
        </a>
        <div class="logo">ProTrack</div>
        <div style="width: 44px;"></div> <!-- لموازنة التصميم في الهيدر -->
    </header>

    <!-- المحتوى الفعلي للتطبيق عند الفتح -->
    <main class="main-container">
        <div class="welcome-card">
            <h1>أهلاً بك في ProTrack</h1>
            <p>اضغط على زر القائمة في الأعلى ☰ للتنقل بين الأدوات والبرامج المتاحة مثل حساب الكميات، إدارة المشاريع، وحاسبة الحديد.</p>
            
            <!-- زر إضافي وسط الصفحة يقوم بنفس العملية لسهولة الاستخدام -->
            <a href="w2n://open-sidebar" class="action-btn">فتح قائمة الأدوات</a>
        </div>
    </main>

</body>
</html>
