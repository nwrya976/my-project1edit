<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrack Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* إجبار المتصفح على عرض حجم الخط الأساسي أكبر */
        html { font-size: 20px !important; }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif !important;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            width: 100%;
            height: 90px;
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .menu-btn {
            background: #f1f5f9;
            border: none;
            font-size: 38px !important;
            color: #4a154b;
            width: 65px;
            height: 65px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .logo {
            font-size: 32px !important;
            font-weight: 800;
            color: #4a154b;
        }

        .main-container {
            margin-top: 130px;
            width: 100%;
            max-width: 550px;
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .welcome-section {
            background: linear-gradient(135deg, #4a154b 0%, #6b21a8 100%);
            color: #ffffff;
            padding: 30px;
            border-radius: 22px;
        }

        .welcome-section h1 { font-size: 30px !important; margin-bottom: 12px; }
        .welcome-section p { font-size: 18px !important; line-height: 1.6; opacity: 0.95; }

        .section-title { font-size: 20px !important; font-weight: 800; color: #64748b; }

        .tool-card {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
        }

        .tool-icon {
            width: 65px;
            height: 65px;
            background: #fae8ff;
            color: #4a154b;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px !important;
        }

        .title { font-size: 22px !important; font-weight: 800; color: #1e293b; }
        .subtitle { font-size: 16px !important; color: #64748b; margin-top: 4px; }
        .arrow-icon { font-size: 24px !important; color: #94a3b8; }
    </style>
</head>
<body>

    <header class="header">
        <a href="w2n://open-sidebar" class="menu-btn">☰</a>
        <div class="logo">ProTrack</div>
        <div style="width: 65px;"></div>
    </header>

    <main class="main-container">
        <div class="welcome-section">
            <h1>منصة الإدارة والأدوات</h1>
            <p>اختر الأداة المطلوبة من القائمة أدناه أو اضغط على زر القائمة في الأعلى.</p>
        </div>

        <p class="section-title">قائمة الأدوات</p>

        <a href="w2n://open-sidebar" class="tool-card">
            <div style="display:flex; align-items:center; gap:20px;">
                <div class="tool-icon">💼</div>
                <div>
                    <div class="title">إدارة المشاريع</div>
                    <div class="subtitle">متابعة سير الأعمال والمهام</div>
                </div>
            </div>
            <div class="arrow-icon">◀</div>
        </a>

        <a href="w2n://open-sidebar" class="tool-card">
            <div style="display:flex; align-items:center; gap:20px;">
                <div class="tool-icon">📊</div>
                <div>
                    <div class="title">حساب الكميات</div>
                    <div class="subtitle">جداول المسح الإنشائي</div>
                </div>
            </div>
            <div class="arrow-icon">◀</div>
        </a>

        <a href="w2n://open-sidebar" class="tool-card">
            <div style="display:flex; align-items:center; gap:20px;">
                <div class="tool-icon">🏗️</div>
                <div>
                    <div class="title">كمية الحديد</div>
                    <div class="subtitle">حساب أوزان التسليح</div>
                </div>
            </div>
            <div class="arrow-icon">◀</div>
        </a>
    </main>
</body>
</html>
